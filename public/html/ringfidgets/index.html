<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">

    <!-- General CSS -->
    <link href="Styles/topnav.css" rel="stylesheet">

    <title>Ring Fidgets</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Basic:wght@100..400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="Styles/oswald.css" rel="stylesheet">
    <link href="Styles/playwrite-nz-basic.css" rel="stylesheet">
</head>

<body>
    <div class="topnav">
        <div class="topnav-left">
            <a href="#home" class="active">Home</a>
            <a href="#why">Why</a>
            <a href="#about">About</a>
        </div>

        <div class="topnav-center">
            <h1 class="playwrite-nz-basic-title">Ring Fidgets</h1>
        </div>

        <div class="topnav-right">
            <a href="dashboard/dashboard.html">Dashboard</a>
            <a href="login.html">Login</a>

    </div>

    <div class="content">
        <section id="home">

    <script>
        const navLinks = document.querySelectorAll('.topnav a');

        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
            });
        });

        // Default to #home only if no hash exists
        if (!window.location.hash) {
            window.location.hash = "home";
        }
    </script>
</body>
</html>
