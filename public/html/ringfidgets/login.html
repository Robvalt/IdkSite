<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">

    <!-- General CSS -->
    <link href="Styles/topnav.css" rel="stylesheet">
    <link href="Styles/aligning.css" rel="stylesheet">

    <title>Ring Fidgets - Login</title>
    <link rel="icon" type="image/svg" href="Images/Logo.svg">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Basic:wght@100..400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="topnav">
        <div class="topnav-left">
            <a href="index.html#home">Home</a>
            <a href="index.html#about">About</a>
        </div>

        <div class="topnav-center">
            <h1 class="playwrite-nz-basic-title">Ring Fidgets</h1>
        </div>

        <div class="topnav-right">
            <a href="login.html" class="active">Login</a>
        </div>
    </div>

    <div class="content">
        <h1>Login</h1>
        <p>Login form goes here.</p>
    </div>

    <script>
        const navLinks = document.querySelectorAll('.topnav a');

        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
            });
        });
    </script>
</body>
</html>
