<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <!-- Supabase Init -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- General CSS -->
    <link href="Styles/topnav.css" rel="stylesheet">
    <link href="Styles/background.css" rel="stylesheet">
    <link href="Styles/utils.css" rel="stylesheet">
    <title>Doughy Delights - Login</title>
    <link rel="icon" type="image/svg" href="Images/Logo.svg">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Basic:wght@100..400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
    <link href="Styles/oswald.css" rel="stylesheet">
    <link href="Styles/playwrite-nz-basic.css" rel="stylesheet">
    <link href="Styles/merriweather.css" rel="stylesheet">
    <!-- Inline CSS for Login Page specific styling -->
    <style>
        .login-container {
            max-width: 400px;
            margin-top: 50px;
            padding: 30px;
            background-color: rgba(255, 255, 255, 0.95); /* Light background for readability */
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .form-label {
            font-weight: 500;
        }
        .btn-primary {
            background-color: #ff5733; /* Example brand color */
            border-color: #ff5733;
        }
        .btn-primary:hover {
            background-color: #e04e2e;
            border-color: #e04e2e;
        }
        .text-center img {
            width: 80px;
            margin-bottom: 20px;
        }
        #info {
            text-decoration-color: red;
        }
    </style>
</head>
<body>
    <div class="topnav">
        <div class="topnav-left">
            <a href="index.html#home">Home</a>
            <a href="index.html#eq">Essential Question</a>
            <a href="index.html#about">About</a>
        </div>
        <div class="topnav-center">
            <h1 class="merriweather-title no-margin_padding">Doughy Delights</h1>
        </div>
        <div class="topnav-right">
            <a href="dashboard/dashboard.html">Dashboard</a>
            <a href="#" class="active">Login</a>
        </div>
    </div>

    <!-- Page Sections -->
    <div class="content">
        <!-- Login Form Container -->
        <div class="container d-flex justify-content-center">
            <div class="login-container">
                <div class="text-center">
                    <img src="Images/Logo.svg" alt="Doughy Delights Logo">
                    <h2 class="oswald-font mb-4">Sign Up</h2>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="text" class="form-control" id="email" name="email" required aria-describedby="emailHelp">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary" id="signup-btn">Sign Up</button>
                </div>
                <div class="mt-3 text-center">
                    <p>have an account? <a href="login.html">Login</a></p>
                    <p id="info"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle (optional, for components requiring JS) -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="Scripts/nav.js"></script>
    <script src="Scripts/signup.js"></script>
</body>
</html>
