<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 98 Demo</title>
    <!-- Paste the HTML Head Code Block here -->
    <link rel="stylesheet" href="win.css" />
    <script src="win.js"></script>
</head>
<body>

    <window-98 title="My First Window">
        <p>Hello, world! This is the content inside the custom Windows 98-style window. You can drag me by the title bar.</p>
        <button onclick="alert('Button clicked!')">A button</button>
    </window-98>

    <window-98 title="Another Window" style="left: 300px; top: 100px;">
        <h2>About This Demo</h2>
        <p>This demonstrates using a custom HTML tag for a retro UI.</p>
    </window-98>

</body>
