<!DOCTYPE html>
<html>
<head>
  <title>[MODDING] NEAAAT Clicker Shop</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <center><h1 id="Title">🛍️ NEAAAT Shop</h1></center>

    <div class="upgrade">
      <h2>Griffin DVD Upgrade</h2>
      <p>Cost: 250 Points</p>
      <button onclick="buyDVDUpgrade();">Buy</button>
    </div>
  </div>

  <center><a href="../"><button id="backBtn">⬅️ Back to Game</button></a></center>

  <script src="ClickerShop.js"></script>
